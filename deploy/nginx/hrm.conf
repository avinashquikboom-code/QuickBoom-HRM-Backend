# Nginx reverse proxy for HRM — two domains.
#   voxiqai.com / www.voxiqai.com  -> admin panel (Next.js, 127.0.0.1:3000)
#   api.voxiqai.com                -> backend API (Express,  127.0.0.1:5004)
#
# Install: copy to /etc/nginx/sites-available/hrm.conf, symlink into
#          sites-enabled, then `nginx -t && systemctl reload nginx`.
# TLS:     sudo certbot --nginx -d voxiqai.com -d www.voxiqai.com -d api.voxiqai.com
#          (certbot rewrites these blocks to add 443 + redirects.)

upstream hrm_admin   { server 127.0.0.1:3000; keepalive 16; }
upstream hrm_backend { server 127.0.0.1:5004; keepalive 16; }

# ----------------------------- Admin panel -----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name voxiqai.com www.voxiqai.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hrm_admin;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# ------------------------------- Backend API ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.voxiqai.com;

    client_max_body_size 25m;

    # API
    location / {
        proxy_pass http://hrm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (socket.io)
    location /socket.io/ {
        proxy_pass http://hrm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }
}
