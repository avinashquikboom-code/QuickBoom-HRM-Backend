# Render Blueprint for Quickboom Backend
# 1. Push code to GitHub
# 2. Update YOUR_USERNAME/YOUR_REPO below
# 3. In Render Dashboard → Blueprints → New Blueprint Instance → select repo
# 4. Set secret env vars (DATABASE_URL, JWT_SECRET, GOOGLE_MAPS_API_KEY) in dashboard

services:
  - type: web
    name: quickboom-backend
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    branch: main
    rootDir: ./quickboom-backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard: your Supabase PostgreSQL URL
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard: openssl rand -base64 32
      - key: GOOGLE_MAPS_API_KEY
        sync: false  # Set in Render dashboard: your Google Maps API key
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false  # Optional: paste Firebase service account JSON
    healthCheckPath: /
    autoDeploy: true

